name: Build & Push Docker Image

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to justrunmy.app registry
        uses: docker/login-action@v3
        with:
          registry: jdr-q36zg78bo.justrunmy.app
          username: ${{ secrets.JUSTRUNMY_USERNAME }}
          password: ${{ secrets.JUSTRUNMY_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: jdr-q36zg78bo.justrunmy.app/q36zg78bo:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
